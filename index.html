<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A personal course workspace for a one-year data science, analytics engineering, data engineering, and MLOps learning path."
    />
    <title>Data Science Course Workspace</title>
    <link rel="stylesheet" href="styles.css?v=course-rebuild-v1" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="app.js?v=course-rebuild-v1" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true">
            <i data-lucide="route"></i>
          </div>
          <div>
            <p class="eyebrow">Personal LMS</p>
            <h1>Data Science Course Workspace</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" type="button" data-action="export-progress" aria-label="Export progress">
            <i data-lucide="download"></i>
          </button>
          <label class="icon-button file-trigger" aria-label="Import progress">
            <i data-lucide="upload"></i>
            <input id="importFile" type="file" accept="application/json" />
          </label>
          <button class="icon-button danger" type="button" data-action="reset-progress" aria-label="Reset progress">
            <i data-lucide="rotate-ccw"></i>
          </button>
        </div>
      </header>

      <main id="app" class="app-grid" aria-live="polite"></main>
    </div>
  </body>
</html>
